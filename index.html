<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hnefatafl (11×11) — Онлайн</title>
  <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #1a1a1a;
      color: #eee;
      text-align: center;
      margin: 20px;
    }
    h1 { margin: 0.4em; color: #ffcc00; }
    #status {
      font-size: 1.5em;
      margin: 15px;
      min-height: 1.8em;
      font-weight: bold;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(11, 52px);
      grid-template-rows: repeat(11, 52px);
      gap: 3px;
      margin: 20px auto;
      width: fit-content;
      background: #333;
      padding: 12px;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
    .cell {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .light { background: #e8d5b8; }
    .dark  { background: #b38b67; }
    .throne { background: #555 !important; }
    .escape { background: #444 !important; box-shadow: inset 0 0 15px #ffaa00; }
    .selected { box-shadow: 0 0 0 5px #ff8800 inset !important; }
    .possible {
      box-shadow: 0 0 0 5px #22ff44 inset !important;
      background: rgba(80, 255, 100, 0.35) !important;
    }
    .piece {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 26px;
      user-select: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.6);
    }
    .defender { background: #1e4a8c; color: white; border: 3px solid #88bbff; }
    .attacker  { background: #9c1f1f; color: white; border: 3px solid #ff7777; }
    .king {
      background: linear-gradient(#f0d070, #c09030);
      color: #222;
      font-size: 34px;
      border: 4px solid #ffeb3b;
    }
    button {
      padding: 12px 28px;
      font-size: 1.2em;
      margin: 8px 4px;
      background: #ff8800;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #ffaa33; }
    #multiplayer-controls {
      margin: 20px 0;
      padding: 15px;
      background: #222;
      border-radius: 12px;
      border: 1px solid #444;
    }
    #myPeerId {
      font-family: monospace;
      font-size: 1.1em;
      color: #88ff88;
      margin: 12px 0;
    }
    input {
      padding: 10px;
      font-size: 1.1em;
      width: 220px;
      margin: 8px;
    }

    /* Окно передачи хода (для hot-seat) */
    .overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .overlay-content {
      background: #222;
      padding: 40px 60px;
      border-radius: 15px;
      text-align: center;
      border: 4px solid #ff8800;
      max-width: 90%;
    }
    .overlay-content h2 { color: #ffcc00; margin: 0 0 20px 0; }
  </style>
</head>
<body>

<h1>Hnefatafl (11×11) — Онлайн / Два игрока</h1>
<div id="status">Ход защитников (синие)</div>
<div id="board"></div>

<div id="multiplayer-controls">
  <button onclick="createRoom()">Создать комнату (я — защитники)</button>
  <button onclick="joinRoom()">Присоединиться к игре</button>
  <br>
  <input id="roomIdInput" placeholder="Введи ID комнаты" />
  <p id="myPeerId"></p>
</div>

<button onclick="resetGame()">Новая игра (локальная)</button>

<div id="overlay" class="overlay">
  <div class="overlay-content">
    <h2 id="overlayTitle">Передача устройства</h2>
    <p id="overlayText" style="font-size:1.4em; line-height:1.4;"></p>
    <button onclick="continueGame()" style="margin-top:25px;">Готово → следующий игрок</button>
  </div>
</div>

<script>
// ====================== HNEFATAFL + PEERJS ======================
const SIZE = 11;
let board = [];
let selected = null;
let currentPlayer = 1; // 1 = DEF (синие), 2 = ATT (красные)
let gameOver = false;

const DEF = 1;
const ATT = 2;
const KING = 3;

let peer = null;
let conn = null;
let myPlayer = null;          // 1 или 2 — за кого играю Я
let isHost = false;

const statusEl = document.getElementById("status");
const overlay = document.getElementById("overlay");
const overlayTitle = document.getElementById("overlayTitle");
const overlayText = document.getElementById("overlayText");
const peerIdEl = document.getElementById("myPeerId");

function initBoard() {
  board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
  board[5][5] = "throne";
  [[0,0],[0,10],[10,0],[10,10]].forEach(([r,c]) => board[r][c] = "escape");

  // Защитники — 12 штук + король
  [[5,3],[5,4],[5,6],[5,7],[3,5],[4,5],[6,5],[7,5],
   [4,4],[4,6],[6,4],[6,6]].forEach(([r,c]) => board[r][c] = DEF);
  board[5][5] = KING;

  // Нападающие — 24
  for (let i = 3; i <= 7; i++) {
    board[0][i] = board[10][i] = ATT;
    board[i][0] = board[i][10] = ATT;
  }
  board[1][5] = board[9][5] = ATT;
  board[5][1] = board[5][9] = ATT;
}

// ─── RENDER ──────────────────────────────────────────────
function getCellClass(r, c) {
  if (board[r][c] === "throne") return "cell throne";
  if (board[r][c] === "escape") return "cell escape";
  return (r + c) % 2 === 0 ? "cell light" : "cell dark";
}

function getPieceHTML(val) {
  if (val === DEF) return '<div class="piece defender">D</div>';
  if (val === ATT) return '<div class="piece attacker">A</div>';
  if (val === KING) return '<div class="piece king">♔</div>';
  return '';
}

function render() {
  const boardEl = document.getElementById("board");
  boardEl.innerHTML = '';
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const cell = document.createElement("div");
      cell.className = getCellClass(r, c);
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.innerHTML = getPieceHTML(board[r][c]);
      cell.addEventListener("click", handleClick);
      boardEl.appendChild(cell);
    }
  }
  if (selected) highlightMoves();
  updateStatus();
}

function highlightMoves() {
  if (!selected) return;
  const [r, c] = selected;
  const moves = getPossibleMoves(r, c);
  moves.forEach(([tr, tc]) => {
    document.querySelector(`[data-row="${tr}"][data-col="${tc}"]`)?.classList.add("possible");
  });
}

function updateStatus() {
  if (gameOver) return;
  let txt = currentPlayer === DEF ? "Ход защитников (синие)" : "Ход нападающих (красные)";
  if (myPlayer !== null) {
    txt += ` — ты играешь за ${myPlayer === DEF ? "защитников" : "нападающих"}`;
  }
  statusEl.textContent = txt;
}

// ─── CLICK & MOVE LOGIC ──────────────────────────────────
function handleClick(e) {
  if (gameOver || overlay.style.display === "flex") return;

  const row = parseInt(e.currentTarget.dataset.row);
  const col = parseInt(e.currentTarget.dataset.col);
  const piece = board[row][col];

  // Можно выбирать только свои фигуры
  if (piece === myPlayer || (piece === KING && myPlayer === DEF)) {
    selected = [row, col];
    render();
    return;
  }

  if (selected && currentPlayer === myPlayer) {
    const [fr, fc] = selected;
    if (isValidMove(fr, fc, row, col)) {
      makeMove(fr, fc, row, col);
      selected = null;
    } else {
      selected = null;
      render();
    }
  }
}

function isValidMove(fr, fc, tr, tc) {
  if (fr === tr && fc === tc) return false;
  if (!isStraightLine(fr, fc, tr, tc)) return false;
  if (!isPathEmpty(fr, fc, tr, tc)) return false;
  const target = board[tr][tc];
  if (target !== 0 && typeof target !== "string") return false;
  if ((target === "throne" || target === "escape") && board[fr][fc] !== KING) return false;
  return true;
}

function isStraightLine(r1,c1,r2,c2) { return r1 === r2 || c1 === c2; }

function isPathEmpty(r1,c1,r2,c2) {
  const dr = Math.sign(r2 - r1);
  const dc = Math.sign(c2 - c1);
  let r = r1 + dr, c = c1 + dc;
  while (r !== r2 || c !== c2) {
    if (board[r][c] !== 0 && typeof board[r][c] !== "string") return false;
    r += dr; c += dc;
  }
  return true;
}

function getPossibleMoves(row, col) {
  const moves = [];
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (let [dr, dc] of dirs) {
    let r = row + dr, c = col + dc;
    while (r >= 0 && r < SIZE && c >= 0 && c < SIZE) {
      if (!isValidMove(row, col, r, c)) break;
      moves.push([r, c]);
      r += dr; c += dc;
    }
  }
  return moves;
}

function makeMove(fr, fc, tr, tc) {
  board[tr][tc] = board[fr][fc];
  board[fr][fc] = 0;
  performCaptures(tr, tc);
  checkWinConditions();

  // Отправляем ход оппоненту
  if (conn && conn.open) {
    conn.send({ type: 'move', fr, fc, tr, tc });
  }

  if (!gameOver) {
    currentPlayer = currentPlayer === DEF ? ATT : DEF;
    // Если онлайн — не показываем overlay, ходит оппонент
    if (!conn || !conn.open) {
      setTimeout(showTurnOverlay, 300);
    }
  }
  render();
}

function performCaptures(row, col) {
  const mover = board[row][col];
  const opponent = (mover === DEF || mover === KING) ? ATT : DEF;
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];

  for (let [dr, dc] of dirs) {
    const midR = row + dr, midC = col + dc;
    const endR = row + dr*2, endC = col + dc*2;
    if (endR < 0 || endR >= SIZE || endC < 0 || endC >= SIZE) continue;

    const mid = board[midR][midC];
    const end = board[endR][endC];

    if ((mid === opponent || mid === KING) &&
        (end === mover || end === KING || end === "throne" || end === "escape")) {
      if (mid !== KING) board[midR][midC] = 0;
    }
  }
}

function checkWinConditions() {
  for (let [r,c] of [[0,0],[0,10],[10,0],[10,10]]) {
    if (board[r][c] === KING) {
      gameOver = true;
      statusEl.innerHTML = `<span style="color:#44ff88">ПОБЕДА ЗАЩИТНИКОВ!</span><br>Король сбежал`;
      return;
    }
  }

  let kr = -1, kc = -1;
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (board[r][c] === KING) { kr = r; kc = c; }
  }
  if (kr === -1) {
    gameOver = true;
    statusEl.innerHTML = `<span style="color:#ff4444">ПОБЕДА НАПАДАЮЩИХ!</span><br>Король захвачен`;
    return;
  }

  if (kr === 5 && kc === 5) {
    let count = 0;
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc]) => {
      if (board[5+dr][5+dc] === ATT) count++;
    });
    if (count >= 4) {
      gameOver = true;
      statusEl.innerHTML = `<span style="color:#ff4444">ПОБЕДА НАПАДАЮЩИХ!</span><br>Король захвачен на троне`;
    }
  }
}

// ─── PEERJS МУЛЬТИПЛЕЕР ──────────────────────────────────
function createRoom() {
  isHost = true;
  myPlayer = DEF;
  currentPlayer = DEF;
  peer = new Peer();

  peer.on('open', id => {
    peerIdEl.innerHTML = `Твой ID: <b>${id}</b><br>Отправь этот код другу`;
    alert(`Комната создана!\nТвой ID: ${id}\nПередай его второму игроку.`);
  });

  peer.on('connection', connection => {
    conn = connection;
    setupConnection();
    alert("Игрок подключился! Начинаем игру.");
  });
}

function joinRoom() {
  const id = document.getElementById("roomIdInput").value.trim();
  if (!id) return alert("Введите ID комнаты!");

  isHost = false;
  myPlayer = ATT;
  peer = new Peer();

  conn = peer.connect(id);

  setupConnection();
  peerIdEl.innerHTML = `Подключаемся к ${id}...`;
}

function setupConnection() {
  conn.on('open', () => {
    peerIdEl.innerHTML += "<br><span style='color:#88ff88'>Соединение установлено!</span>";
    if (isHost) {
      // Хост отправляет начальное состояние
      conn.send({ type: 'init', board, currentPlayer });
    } else {
      // Гость запрашивает состояние
      conn.send({ type: 'requestInit' });
    }
  });

  conn.on('data', data => {
    if (data.type === 'move') {
      board[data.tr][data.tc] = board[data.fr][data.fc];
      board[data.fr][data.fc] = 0;
      performCaptures(data.tr, data.tc);
      checkWinConditions();
      currentPlayer = currentPlayer === DEF ? ATT : DEF;
      selected = null;
      render();
    }
    else if (data.type === 'init') {
      board = data.board;
      currentPlayer = data.currentPlayer;
      render();
    }
    else if (data.type === 'requestInit') {
      if (isHost) {
        conn.send({ type: 'init', board, currentPlayer });
      }
    }
  });

  conn.on('close', () => {
    alert("Соединение потеряно");
    peerIdEl.innerHTML += "<br><span style='color:#ff4444'>Оппонент отключился</span>";
  });

  conn.on('error', err => {
    console.error(err);
    alert("Ошибка соединения: " + err.message);
  });
}

// ─── HOT-SEAT (локальная передача) ───────────────────────
function showTurnOverlay() {
  if (conn && conn.open) return; // онлайн — не показываем
  render();
  const name = currentPlayer === DEF ? "ЗАЩИТНИКОВ (синие)" : "НАПАДАЮЩИХ (красные)";
  overlayTitle.textContent = `Ход ${name}`;
  overlayText.innerHTML = `Передайте устройство<br>второму игроку`;
  overlay.style.display = "flex";
}

function continueGame() {
  overlay.style.display = "none";
  render();
}

// ─── RESET ───────────────────────────────────────────────
function resetGame() {
  if (conn) conn.close();
  peer?.destroy();
  peer = null;
  conn = null;
  myPlayer = null;
  isHost = false;
  overlay.style.display = "none";
  selected = null;
  currentPlayer = DEF;
  gameOver = false;
  initBoard();
  render();
  peerIdEl.innerHTML = "";
  document.getElementById("roomIdInput").value = "";
}

// ─── START ───────────────────────────────────────────────
window.onload = () => {
  initBoard();
  render();
};
</script>
</body>
</html>
