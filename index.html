<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Хнефатафл</title>
    <style>
        /* весь твой стиль без изменений */
        body { font-family: Arial, Helvetica, sans-serif; background: #1a1a1a; color: #eee; text-align: center; margin: 20px; }
        h1 { margin: 0.4em; color: #ffcc00; }
        #status { font-size: 1.4em; margin: 15px; min-height: 1.8em; font-weight: bold; color: #88ff88; }
        #board { display: grid; grid-template-columns: repeat(11, 52px); grid-template-rows: repeat(11, 52px); gap: 3px; margin: 20px auto; width: fit-content; background: #333; padding: 12px; border-radius: 15px; box-shadow: 0 0 40px rgba(0,0,0,0.8); position: relative; overflow: visible; }
        .cell { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; border-radius: 8px; transition: all 0.15s; position: relative; }
        .light { background: #e8d5b8; } .dark { background: #b38b67; }
        .throne { background: #555 !important; } .escape { background: #444 !important; box-shadow: inset 0 0 15px #ffaa00; }
        .selected { box-shadow: 0 0 0 5px #ff8800 inset !important; }
        .possible { box-shadow: 0 0 0 5px #22ff44 inset !important; background: rgba(80,255,100,0.35) !important; }
        .piece { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 26px; user-select: none; box-shadow: 0 4px 8px rgba(0,0,0,0.6); opacity: 1 !important; }
        .defender { background: #1e4a8c; color: white; border: 3px solid #88bbff; }
        .attacker { background: #9c1f1f; color: white; border: 3px solid #ff7777; }
        .king { background: linear-gradient(#f0d070, #c09030); color: #222; font-size: 34px; border: 4px solid #ffeb3b; }
        .piece.flying { position: absolute; z-index: 200; pointer-events: none; transition: all 0.62s cubic-bezier(0.25,0.1,0.25,1); box-shadow: 0 10px 20px rgba(0,0,0,0.5); opacity: 1 !important; }
        button { padding: 12px 28px; font-size: 1.2em; margin: 10px; background: #ff8800; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #ffaa33; }
        #multiplayerPanel { margin: 20px auto; max-width: 600px; }
        #roomInfo { margin-top: 12px; font-size: 1.15em; line-height: 1.5; word-break: break-all; }
        input[type="text"] { padding: 8px; font-size: 1em; width: 80%; max-width: 400px; margin: 8px 0; }
    </style>
</head>

<body>

    <h1>Хнефатафл</h1>
    <div id="status">Нажмите «Новая игра» или создайте/присоединитесь к комнате</div>
    <div id="board"></div>

    <div id="multiplayerPanel">
        <button id="singleBtn">Новая игра (одиночная)</button>
        <button id="createBtn">Создать комнату</button>
        <button id="joinBtn">Присоединиться по ID комнаты</button>
        <div id="roomInfo"></div>
    </div>

    <script type="module">
        import { joinRoom } from 'https://esm.run/trystero'

        const SIZE = 11;
        let board = [];
        let selected = null;
        let currentPlayer = 1;
        let gameOver = false;
        let gameStarted = false;

        const DEF = 1;
        const ATT = 2;
        const KING = 3;

        const statusEl = document.getElementById("status");
        const roomInfoEl = document.getElementById("roomInfo");
        const boardEl = document.getElementById("board");

        let room = null;
        let sendMove = null;
        let getMove = null;
        let sendRequestInit = null;
        let getRequestInit = null;
        let sendState = null;
        let getState = null;
        let isBlueSide = true;

        function initEmptyBoard() { /* без изменений */ 
            board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            board[5][5] = "throne";
            [[0, 0], [0, 10], [10, 0], [10, 10]].forEach(([r, c]) => board[r][c] = "escape");
        }

        function initFullBoard() { /* без изменений */ 
            [[5, 3], [5, 4], [5, 6], [5, 7], [3, 5], [4, 5], [6, 5], [7, 5],
            [4, 4], [4, 6], [6, 4], [6, 6]].forEach(([r, c]) => board[r][c] = DEF);
            board[5][5] = KING;
            for (let i = 3; i <= 7; i++) {
                board[0][i] = board[10][i] = ATT;
                board[i][0] = board[i][10] = ATT;
            }
            board[1][5] = board[9][5] = ATT;
            board[5][1] = board[5][9] = ATT;
        }

        /* все остальные функции (getCellClass, render, startNewGameSingle, makeMove, handleClick и т.д.) — полностью без изменений, как в предыдущей версии */

        async function createOrJoinRoom(roomId, asCreator = true, hostIsDefender = true) {
            if (room) room.leave();

            // ==================== ИСПРАВЛЕНИЕ РЕЛЕЕВ + TURN ====================
            const config = {
                appId: 'hnefatafl-f8-2025',

                // ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←
                // Только надёжные релеи (black.nostrcity.club исключён)
                relayUrls: [
                    'wss://nos.lol',
                    'wss://relay.damus.io',
                    'wss://nostr.wine',
                    'wss://relay.primal.net',
                    'wss://nostr.zebedee.cloud'
                ],
                // =============================================================

                rtcConfig: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:openrelay.metered.ca:80' },
                        {
                            urls: [
                                'turn:openrelay.metered.ca:80?transport=udp',
                                'turn:openrelay.metered.ca:80?transport=tcp',
                                'turn:openrelay.metered.ca:443?transport=tcp'
                            ],
                            username: 'openrelayproject',
                            credential: 'openrelayproject'
                        }
                    ]
                }
            };

            room = joinRoom(config, roomId);

            // === Действия для ходов и инициализации (без изменений) ===
            [sendMove, getMove] = room.makeAction('move');
            [sendRequestInit, getRequestInit] = room.makeAction('requestInit');
            [sendState, getState] = room.makeAction('state');

            getMove((data) => { /* без изменений */ });

            room.onPeerJoin((peerId) => {
                if (!asCreator) sendRequestInit({}, peerId);
            });

            getRequestInit((data, senderPeerId) => {
                if (asCreator) {
                    sendState({
                        board: JSON.parse(JSON.stringify(board)),
                        currentPlayer,
                        gameOver,
                        hostIsDefender: isBlueSide
                    }, senderPeerId);
                }
            });

            getState((data) => { /* без изменений */ });

            room.onPeerLeave(() => { /* без изменений */ });

            /* остальной код createOrJoinRoom без изменений (selected, isBlueSide, initFullBoard, render и т.д.) */
            selected = null;
            currentPlayer = DEF;
            gameOver = false;
            gameStarted = true;

            if (asCreator) isBlueSide = hostIsDefender; else isBlueSide = false;

            if (asCreator) { initEmptyBoard(); initFullBoard(); }
            render();

            if (asCreator) {
                const link = `${location.origin}${location.pathname}?r=${encodeURIComponent(roomId)}`;
                roomInfoEl.innerHTML = `Комната: <b>${roomId}</b><br>Ты — ${isBlueSide ? 'защитники (синие)' : 'нападающие (красные)'}<br>Ссылка для друга:<br><input type="text" value="${link}" readonly onclick="this.select()">`;
            } else {
                roomInfoEl.innerHTML = `Комната: <b>${roomId}</b><br>Ожидание инициализации от хоста...`;
            }
        }

        /* все остальные функции и обработчики кнопок — точно как в предыдущей версии (я их не дублирую здесь, чтобы не раздувать, но они остаются 1-в-1) */

        document.getElementById("singleBtn").onclick = startNewGameSingle;
        /* createBtn, joinBtn, urlParams — без изменений */

        initEmptyBoard();
        render();
    </script>
</body>
</html>
